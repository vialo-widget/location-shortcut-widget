<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaviGo - One-tap Navigation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #052008 0%, #0a3d0f 50%, #1B5E20 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #0a3d0f;
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 50px; height: 50px; }
    h1 { color: #0a3d0f; font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 16px; margin-bottom: 24px; }
    .place-name {
      background: #F5F5FA;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .place-name .icon { font-size: 32px; margin-bottom: 8px; }
    .place-name .name { font-size: 22px; font-weight: 600; color: #1A1A2E; }
    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: #2E7D32;
      color: white;
    }
    .btn-download {
      background: #1B5E20;
      color: white;
    }
    .status-msg {
      color: #666;
      font-size: 15px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .features {
      text-align: left;
      margin: 16px 0 8px;
      padding: 0 8px;
    }
    .features li {
      color: #444;
      font-size: 15px;
      margin-bottom: 8px;
      list-style: none;
      padding-left: 28px;
      position: relative;
    }
    .features li::before {
      content: attr(data-icon);
      position: absolute;
      left: 0;
      font-size: 16px;
    }
    .hidden { display: none; }
    #loading { color: #666; font-size: 16px; padding: 40px 0; }
    #error-state .emoji { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 108 108">
        <path fill="rgba(255,255,255,0.18)" d="M54,16c-20.99,0-38,17.01-38,38s17.01,38,38,38 38-17.01,38-38-17.01-38-38-38zM54,88c-18.78,0-34-15.22-34-34s15.22,-34,34-34 34,15.22,34,34-15.22,34-34,34z"/>
        <polygon fill="#FFFFFF" points="73.8,34.2 59.7,48.3 62.7,59.7"/>
        <polygon fill="#A5D6A7" points="73.8,34.2 48.3,59.7 59.7,48.3"/>
        <polygon fill="rgba(255,255,255,0.35)" points="34.2,73.8 48.3,59.7 45.3,48.3"/>
        <polygon fill="rgba(165,214,167,0.3)" points="34.2,73.8 59.7,48.3 48.3,59.7"/>
        <circle fill="rgba(255,255,255,0.9)" cx="54" cy="54" r="3.5"/>
      </svg>
    </div>
    <h1>NaviGo</h1>
    <p class="subtitle">One-tap navigation for everyone</p>

    <!-- Place tile: only shown when the URL has a valid location -->
    <div id="place-tile" class="place-name hidden">
      <div class="icon" id="place-icon"></div>
      <div class="name" id="place-label"></div>
    </div>

    <!-- Status message: text varies by state (loading / fallback / error) -->
    <p class="status-msg" id="status-msg">Opening NaviGo&hellip;</p>

    <!-- Open-in-app button: only shown when the URL has a valid location -->
    <a id="btn-open-app" class="btn btn-primary hidden" href="#">
      Open in NaviGo
    </a>

    <!-- Download button: ALWAYS visible -->
    <a id="btn-download" class="btn btn-download" href="https://github.com/navigo-widget/location-shortcut-widget/releases/latest/download/app-release.apk">
      Download NaviGo (Free)
    </a>

    <ul class="features">
      <li data-icon="&#x2705;">Save places as one-tap shortcuts</li>
      <li data-icon="&#x1F4F1;">Home screen widget for instant access</li>
      <li data-icon="&#x1F91D;">Share locations with family easily</li>
      <li data-icon="&#x1F9D3;">Designed for seniors &mdash; big buttons, simple UI</li>
    </ul>
  </div>

  <script>
    const iconMap = {
      home: '\u{1F3E0}', hospital: '\u{1F3E5}', bank: '\u{1F3E6}', grocery: '\u{1F6D2}',
      temple: '\u{1F6D5}', mosque: '\u{1F54C}', church: '\u26EA', pharmacy: '\u{1F48A}',
      restaurant: '\u{1F37D}\uFE0F', cafe: '\u2615', park: '\u{1F333}', office: '\u{1F3E2}',
      school: '\u{1F393}', gym: '\u{1F4AA}', doctor: '\u{1F468}\u200D\u2695\uFE0F', airport: '\u2708\uFE0F',
      train: '\u{1F686}', bus: '\u{1F68C}', petrol: '\u26FD', market: '\u{1F3EA}',
      friend: '\u{1F46B}', family: '\u{1F468}\u200D\u{1F469}\u200D\u{1F467}\u200D\u{1F466}', place: '\u{1F4CD}'
    };

    function isAndroid() {
      return /android/i.test(navigator.userAgent);
    }

    function isChrome() {
      return /chrome/i.test(navigator.userAgent) && !/edg/i.test(navigator.userAgent);
    }

    function init() {
      const params = new URLSearchParams(window.location.search);
      const label = params.get('label');
      const lat = params.get('lat');
      const lng = params.get('lng');
      const icon = params.get('icon') || 'place';
      // Optional metadata — forward whatever the sender included so the
      // recipient's Edit screen shows the address and the expiry token
      // is honoured. Missing these used to silently drop them.
      const address = params.get('address') || '';
      const placeId = params.get('placeId') || '';
      const expiry = params.get('expiry') || '';

      const statusMsg = document.getElementById('status-msg');

      if (!label || !lat || !lng) {
        statusMsg.innerHTML = 'This link doesn&rsquo;t contain a valid location.<br>Install NaviGo to start saving your own.';
        return;
      }

      let queryParams = 'label=' + encodeURIComponent(label) + '&lat=' + lat + '&lng=' + lng + '&icon=' + encodeURIComponent(icon);
      if (address) queryParams += '&address=' + encodeURIComponent(address);
      if (placeId) queryParams += '&placeId=' + encodeURIComponent(placeId);
      if (expiry) queryParams += '&expiry=' + encodeURIComponent(expiry);
      const deepLink = 'navigo://add?' + queryParams;

      // Build the fallback URL: same page + opened=1 so we skip the intent retry
      var fallbackPage = window.location.href;
      if (fallbackPage.indexOf('opened=') === -1) {
        fallbackPage += (fallbackPage.indexOf('?') === -1 ? '?' : '&') + 'opened=1';
      }
      const intentUrl = 'intent://add?' + queryParams +
        '#Intent;scheme=navigo;package=com.navigo.app;' +
        'S.browser_fallback_url=' + encodeURIComponent(fallbackPage) + ';end';

      // Reveal the place tile + Open-in-app button. Download button is always visible.
      showFallback(label, icon, intentUrl, deepLink);

      // If Chrome already followed S.browser_fallback_url back here, skip the retry.
      if (params.get('opened')) {
        return;
      }

      // On Android Chrome, fire the intent URL via a hidden anchor click.
      // Using a.click() (rather than window.location.href) keeps the page visible
      // so the Download button remains accessible if the app is not installed.
      if (isAndroid() && isChrome()) {
        var a = document.createElement('a');
        a.href = intentUrl;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
    }

    function showFallback(label, icon, intentUrl, deepLink) {
      document.getElementById('place-tile').classList.remove('hidden');
      document.getElementById('place-icon').textContent = iconMap[icon] || '\u{1F4CD}';
      document.getElementById('place-label').textContent = decodeURIComponent(label);

      document.getElementById('status-msg').innerHTML =
        'It looks like NaviGo isn&rsquo;t installed yet.<br>Download it to add this location.';

      var btn = document.getElementById('btn-open-app');
      btn.href = isAndroid() ? intentUrl : deepLink;
      btn.classList.remove('hidden');
    }

    init();
  </script>
</body>
</html>
