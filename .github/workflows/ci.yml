name: CI

on:
  push:
    branches: [main, finishing-touches]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Extract APK signing fingerprint
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          FINGERPRINT=$(keytool -printcert -jarfile "$APK" | grep "SHA256:" | awk '{print $2}')
          echo "APK_FINGERPRINT=$FINGERPRINT" >> "$GITHUB_ENV"
          echo "APK signing SHA-256: $FINGERPRINT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Update latest release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Latest NaviGo debug APK from main.
            Install on any modern Android phone (arm64). Debug signing — for testing only.
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
          make_latest: true
